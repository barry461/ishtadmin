<!DOCTYPE html>
<html>

<head>
	<title>帖子列表</title>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1,user-scalable=no" />
	<script src="../../static/common-head.js"></script>
	<style type="text/css">
		/* .data-table .el-table__body-wrapper{min-height: 0px; max-height: 0px;}
			.data-table .el-table__body-wrapper{transition: all 0.3s;} */
		.data-table {
			width: 100%;
		}
	</style>
</head>

<body>
	<div class="vue-box" style="display: none;" :style="'display: block;'">
		<div class="c-panel">
			<el-form>
				<div class="c-item">
					<label class="c-label">关键词：</label>
					<el-input v-model="params.keyword" clearable @keyup.enter.native="fetchTableData"></el-input>
				</div>
			</el-form>

			<!-- ------------- 快捷按钮 ------------- -->
			<div class="fast-btn">
				<el-button type="danger" :disabled="!multipleSelection.length" icon="el-icon-delete"
					@click="onDelete(multipleSelection)">批量删除</el-button>
				<el-button type="primary" icon="el-icon-plus" @click="add">新增</el-button>
				<el-button type="primary" icon="el-icon-search" @click="fetchTableData">查询</el-button>
				<el-button type="info" icon="el-icon-refresh" @click="resetTableData">重置</el-button>
				<el-button type="warning" icon="el-icon-download" @click="sa.exportExcel()">导出</el-button>
			</div>
			<!-- ------------- 数据列表 ------------- -->
			<el-table @selection-change="handleSelectionChange" v-loading="fetching" class="data-table" ref="data-table"
				:data="dataList" size="small">
				<el-table-column type="selection" width="45px"></el-table-column>
				<el-table-column label="id" prop="id"></el-table-column>
				<el-table-column label="名称" prop="name"></el-table-column>

				<el-table-column prop="address" align="center" label="操作" width="180px">
					<template slot-scope="s">
						<el-button class="c-btn" type="primary" icon="el-icon-edit" @click="update(s.row)">编辑</el-button>

						<el-button class="c-btn" type="danger" @click="onDelete(s.row)" icon="el-icon-delete">删除</el-button>
					</template>
				</el-table-column>

			</el-table>
			<!-- ------------- 分页 ------------- -->
			<div class="page-box">
				<el-pagination :key="dataCount" background layout="total, prev, pager, next, jumper"
					:current-page.sync="pagination.page" :page-size.sync="pagination.limit" :total="dataCount"
					@current-change="fetchTableData" @size-change="fetchTableData">
				</el-pagination>
			</div>

		</div>
		<el-dialog :title="dialogTitle" :visible.sync="dialogVisible" width="50%">

			<el-form ref="form" :model="state" :rules="rules">
				<el-form-item label="标签名称" prop="name">
					<el-input class="w-full" v-model="state.name" clearable></el-input>
				</el-form-item>
			</el-form>
			<span slot="footer" class="dialog-footer">
				<el-button @click="dialogVisible = false">取 消</el-button>
				<el-button type="primary" :loading="submiting" @click="submit">确 定</el-button>
			</span>
		</el-dialog>

	</div>
	<script>

		var app = new Vue({
			el: '.vue-box',
			data: {
				sa: sa,
				dialogVisible: false,
				state: {
					id: '',
					name: ''
				},
				rules: {
					name: [
						{ required: true, message: '请输入标签名称', trigger: 'blur' },
					],
				},
				multipleSelection: [],
				params: {
					keyword: ''
				},
				submiting: false
			},
			computed: {
				dialogTitle() {
					return this.state.id ? '编辑标签' : "新增标签"
				}
			},
			methods: {
				resetTableParams() {
					this.params = {
						keyword: ''
					}
				},
				createState(data) {
					return {
						id: data && data.id ? data.id : '',
						name: data && data.name ? data.name : ''
					}
				},

				async fetchList() {
					this.fetching = true
					try {
						const res = await sa.http({
							url: 'tag/list',
							data: {
								...this.pagination,
								...this.params,
							}
						})

						return res
					} catch (error) {
						return Promise.reject(error)
					} finally {
						this.fetching = false
					}
				},
				update: function (data) {
					this.state = this.createState(data)
					this.dialogVisible = true
					this.$nextTick(() => this.$refs.form && this.$refs.form.clearValidate())
				},
				add() {
					this.state = this.createState()
					this.dialogVisible = true
					this.$nextTick(() => this.$refs.form && this.$refs.form.clearValidate())
				},
				handleSelectionChange(val) {
					this.multipleSelection = val;
				},
				onDelete(s) {
					const res = Array.isArray(s) ? s : [s]
					this.$confirm(`确定删除标签：${res.map(item => item.name).join(',')}?`, '提示', {
						confirmButtonText: '确定',
						cancelButtonText: '取消',
						type: 'warning'
					}).then(async () => {
						try {
							await sa.http({
								url: 'tag/delete',
								data: {
									ids: res.map(item => item.id)
								},
								showSuccess: true
							})
							this.resetTableData()
						} catch (error) {

						}
					}).catch(() => {
						this.$message({
							type: 'info',
							message: '已取消删除'
						});
					});
				},
				submit() {
					this.$refs.form.validate(async valid => {
						if (valid) {
							this.submiting = true
							try {
								await sa.http({
									url: 'tag/save',
									data: {
										id: this.state.id || undefined,
										name: this.state.name
									},
									showSuccess: true
								})
								this.dialogVisible = false
								this.state = this.createState()
								this.resetTableData()
							} catch (error) {

							} finally {
								this.submiting = false
							}
						}
					})
				}
			},

		})
	</script>

</body>

</html>
