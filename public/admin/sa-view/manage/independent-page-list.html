<!DOCTYPE html>
<html>

<head>
	<title>管理独立页面</title>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1,user-scalable=no" />
	<script src="../../static/common-head.js"></script>
	<style type="text/css">
		.page-manage-header {
			display: flex;
			justify-content: space-between;
			align-items: center;
			margin-bottom: 20px;
		}

		.filter-section {
			display: flex;
			align-items: center;
			margin-bottom: 15px;
			flex-wrap: wrap;
		}

		.filter-section .search-input {
			width: 200px;
		}

		.bulk-actions {
			margin-bottom: 10px;
		}

		.data-table {
			margin-bottom: 20px;
		}

		.page-title-cell {
			display: flex;
			align-items: center;
			gap: 8px;
		}

		.page-title-cell .title-text {
			flex: 1;
		}

		.page-title-cell .hide-tag {
			color: #909399;
			font-size: 12px;
		}

		.page-title-cell .action-icons {
			display: flex;
			gap: 5px;
		}

		.page-title-cell .action-icons i {
			cursor: pointer;
			font-size: 16px;
			color: #409EFF;
		}

		.page-title-cell .action-icons i:hover {
			color: #66b1ff;
		}

		.page-id-badge {
			display: inline-block;
			background-color: #E6F7FF;
			color: #1890FF;
			border-radius: 12px;
			padding: 2px 8px;
			font-size: 12px;
			min-width: 24px;
			text-align: center;
		}

		.page-box {
			display: flex;
			justify-content: flex-end;
			margin-top: 20px;
		}
	</style>
</head>

<body>
	<div class="vue-box" style="display: none;" :style="'display: block;'">
		<div class="c-panel">
			<!-- 标题和新增按钮 -->
			<div class="page-manage-header">
				<div class="c-title">管理独立页面</div>

			</div>

			<!-- 筛选和搜索区域 -->
			<div class="filter-section">
				<el-select v-model="p.status" placeholder="状态筛选" clearable style="width: 120px; margin-right: 10px;"
					@change="handleSearch">
					<el-option label="全部" value=""></el-option>
					<el-option label="公开" value="publish"></el-option>
					<el-option label="私密" value="private"></el-option>
					<el-option label="待审核" value="waiting"></el-option>
					<el-option label="隐藏" value="hidden"></el-option>
					<el-option label="密码保护" value="password"></el-option>
					<el-option label="秘闻" value="secret"></el-option>
					<el-option label="草稿" value="draft"></el-option>
					<el-option label="已下架" value="removed"></el-option>
				</el-select>
				<el-input v-model="p.keyword" placeholder="请输入关键字" class="search-input" clearable
					@keyup.enter.native="handleSearch"></el-input>

			</div>

			<!-- 批量操作 -->
			<div class="bulk-actions">
				<el-button type="danger" icon="el-icon-delete" @click="handleBulkDelete">删除</el-button>
				<el-button type="primary" icon="el-icon-plus" @click="add()">新增</el-button>
				<el-button type="primary" icon="el-icon-search" @click="handleSearch">筛选</el-button>
			</div>

			<!-- 数据列表 -->
			<el-table class="data-table" ref="data-table" :data="dataList" size="small" v-loading="tableLoading"
				@selection-change="handleSelectionChange">
				<el-table-column type="selection" width="45px"></el-table-column>
				<el-table-column label="cid" prop="cid" width="80px" align="center"></el-table-column>
				<el-table-column label="标题" align="center">
					<template slot-scope="scope">
						<a :href="scope.row.preview_url" target="_blank"
							style="color: #409EFF; text-decoration: none; cursor: pointer;"
							@click.prevent="handleTitleClick(scope.row)">{{ scope.row.title }}</a>
					</template>
				</el-table-column>
				<el-table-column label="缩略名" prop="slug" align="center"></el-table-column>
				<el-table-column label="作者名字" prop="author_name" align="center"></el-table-column>
				<el-table-column label="发布时间" prop="created" align="center"></el-table-column>
				<el-table-column label="浏览量" prop="view" width="80px" align="center"></el-table-column>
				<el-table-column label="评论" prop="commentsNum" width="80px" align="center"></el-table-column>
				<el-table-column label="状态" width="100px" align="center">
					<template slot-scope="scope">
						<el-tag :type="getStatusType(scope.row.status)" size="small">{{ getStatusText(scope.row.status) }}</el-tag>
					</template>
				</el-table-column>
				<el-table-column label="更新时间" prop="modified" align="center"></el-table-column>
				<el-table-column label="操作" width="180px" align="center">
					<template slot-scope="scope">
						<el-button type="primary" size="mini" icon="el-icon-edit" @click="update(scope.row)">编辑</el-button>
						<el-button v-if="scope.row.status === 'publish'" type="warning" size="mini"
							@click="handleChangeStatus(scope.row, 'removed')">下架</el-button>
						<el-button v-else type="success" size="mini"
							@click="handleChangeStatus(scope.row, 'publish')">公开</el-button>
					</template>
				</el-table-column>
			</el-table>

			<!-- 分页 -->
			<div class="page-box">
				<el-pagination background layout="total, prev, pager, next, sizes, jumper" :current-page.sync="p.page"
					:page-size.sync="p.limit" :total="dataCount" :page-sizes="[10, 20, 30, 40, 50, 100]" @current-change="f5()"
					@size-change="f5()">
				</el-pagination>
			</div>
		</div>
	</div>
	<script>
		var app = new Vue({
			el: '.vue-box',
			data: {
				sa: sa,
				tableLoading: false, // 表格加载状态
				selectedRows: [], // 选中的行
				p: { // 查询参数
					keyword: '',
					status: '',
					page: 1,
					limit: 10,
				},
				dataCount: 0,	// 数据总数 
				dataList: [] // 数据集合
			},
			methods: {
				// 搜索时重置页码
				handleSearch: function () {
					this.p.page = 1;
					this.f5();
				},
				// 数据刷新
				async f5() {
					this.tableLoading = true;
					try {
						var params = {
							page: Number(this.p.page || 1),
							limit: Number(this.p.limit || 10)
						};
						if (this.p.keyword && this.p.keyword.trim()) {
							params.keyword = this.p.keyword.trim();
						}
						if (this.p.status) {
							params.status = this.p.status;
						}

						const res = await sa.http({
							url: '/independent/list',
							data: params
						});
						var data = res && res.data ? res.data : {};
						this.dataList = Array.isArray(data.list) ? data.list : [];
						this.dataCount = Number(data.total || 0);

						sa.f5TableHeight(); // 刷新表格高度
					} catch (error) {
						console.error('获取独立页面列表失败:', error);
						this.dataList = [];
						this.dataCount = 0;
						sa.f5TableHeight();
					} finally {
						this.tableLoading = false;
					}
				},
				// 修改
				update: function (data) {
					var cid = data.cid || data.id;

					window.parent.sa_admin.updateTabByUser('2-3', `cid=${cid}`);

				},
				// 新增
				add: function () {
					// 清除sessionStorage中的编辑数据，设置为新增模式
					try {
						sessionStorage.removeItem('editPageCid');
						sessionStorage.setItem('editPageMode', 'add');
					} catch (e) {
						console.error('清除编辑数据失败：', e);
					}

					// 跳转到创建新页面页面
					try {
						var sa_admin = window.parent && window.parent.sa_admin ? window.parent.sa_admin :
							(window.top && window.top.sa_admin ? window.top.sa_admin : null);

						if (sa_admin) {
							// 先关闭已存在的tab，再打开新的
							var existingTab = sa_admin.getTabById('2-2');
							if (existingTab) {
								// 先关闭tab，然后重新打开
								sa_admin.closeTabById('2-2');
								// 延迟打开，确保关闭动画完成
								setTimeout(function () {
									sa_admin.showMenuById('2-2');
								}, 200);
							} else {
								sa_admin.showMenuById('2-2');
							}
						} else {
							// 降级方案
							if (window.parent && window.parent !== window) {
								window.parent.location.hash = '#2-2';
							} else {
								window.location.hash = '#2-2';
							}
						}
					} catch (e) {
						console.error('导航失败：', e);
						if (window.parent && window.parent !== window) {
							window.parent.location.hash = '#2-2';
						} else {
							window.location.hash = '#2-2';
						}
					}
				},
				// 标题点击跳转
				handleTitleClick: function (row) {
					if (row.preview_url) {
						window.open(row.preview_url, '_blank');
					} else if (row.slug) {
						window.open('/' + row.slug, '_blank');
					} else {
						sa.msg('该页面没有设置预览地址');
					}
				},
				// 查看
				handleView: function (row) {
					if (row.preview_url) {
						window.open(row.preview_url, '_blank');
					} else if (row.slug) {
						window.open('/page/' + row.slug, '_blank');
					} else {
						sa.msg('该页面没有设置预览地址');
					}
				},
				// 选择变化
				handleSelectionChange: function (selection) {
					this.selectedRows = selection;
				},
				// 获取状态类型（用于el-tag颜色）
				getStatusType: function (status) {
					var typeMap = {
						'publish': 'success',
						'private': 'info',
						'waiting': 'warning',
						'hidden': 'info',
						'password': '',
						'secret': 'danger',
						'draft': 'info',
						'removed': 'danger'
					};
					return typeMap[status] || 'info';
				},
				// 获取状态文本
				getStatusText: function (status) {
					var textMap = {
						'publish': '公开',
						'private': '私密',
						'waiting': '待审核',
						'hidden': '隐藏',
						'password': '密码保护',
						'secret': '秘闻',
						'draft': '草稿',
						'removed': '已下架'
					};
					return textMap[status] || status || '未知';
				},
				// 修改状态（公开/下架）
				handleChangeStatus: async function (row, newStatus) {
					var statusText = newStatus === 'publish' ? '公开' : '下架';
					var self = this;
					sa.confirm('确定要' + statusText + '该页面吗？', async function () {
						try {
							const res = await sa.http({
								url: '/independent/batchStatus',
								data: {
									ids: [row.cid],
									status: newStatus
								}
							});
								sa.ok(statusText + '成功');
								self.f5(); // 刷新列表
						} catch (error) {
							console.error(statusText + '失败：', error);
							sa.msg(statusText + '失败');
						}
					});
				},
				// 批量删除
				handleBulkDelete: async function () {
					if (this.selectedRows.length === 0) {
						return sa.msg('请至少选择一条数据');
					}
					var ids = this.selectedRows.map(function (row) { return row.cid; });
					sa.confirm('是否删除选中数据？此操作不可撤销', async function () {
						try {
							const res = await sa.http({
								url: '/independent/delete',
								data: {
									ids: ids // cid 数组集合
								}
							});
								sa.arrayDelete(this.dataList, this.selectedRows);
								sa.ok('删除成功');
								this.selectedRows = [];
								sa.f5TableHeight();
								this.f5(); // 刷新列表
						} catch (error) {
							console.error('删除失败：', error);
						}
					}.bind(this));
				}
			},
			created: function () {
				this.f5();
				sa.onInputEnter();		// 监听输入框的回车事件，执行查询  
			}
		})
	</script>

</body>

</html>
