<!DOCTYPE html>
<html>

<head>
  <title>管理员管理</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1,user-scalable=no" />
  <!-- 所有的 css & js 资源，与其它设置页面保持一致 -->
	<script src="../../static/common-head.js"></script>
	<style type="text/css">
    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .filter-section {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 15px;
      flex-wrap: wrap;
    }

    .filter-section .search-input {
      width: 200px;
    }

    .bulk-actions {
      margin-bottom: 10px;
    }

    .data-table {
      margin-bottom: 20px;
    }

    .page-box {
      display: flex;
      justify-content: flex-end;
      margin-top: 20px;
    }

    .el-table .status-tag {
      cursor: pointer;
    }

    .c-btn {
      margin: 0 3px;
    }

    /* 确保表格可以正常显示所有行，不受高度限制 */
    .vue-box {
      height: auto !important;
      min-height: auto !important;
      overflow: visible !important;
    }

    .c-panel {
      height: auto !important;
      min-height: auto !important;
      overflow: visible !important;
    }

    .data-table {
      height: auto !important;
    }

    .el-table__body-wrapper {
      max-height: none !important;
      height: auto !important;
      overflow-y: visible !important;
    }

    .el-table__body {
      height: auto !important;
    }

    .el-table__row {
      display: table-row !important;
    }

    /* 确保表格单元格内容居中对齐 */
    .data-table .el-table__body .el-table__cell {
      text-align: center;
    }

    .data-table .el-table__header-wrapper .el-table__header th {
      text-align: center;
    }

    /* 确保按钮组在操作列中居中 */
    .data-table .el-table__body .el-table__cell .c-btn {
      margin: 0 3px;
    }
  </style>
</head>

<body>
  <div id="app" class="vue-box" style="display:none;" :style="'display:block;'">
    <div class="c-panel">
      <div class="admin-header">
        <div class="c-title">管理员管理</div>
      </div>

      <!-- 筛选区域 -->
      <div class="filter-section">
        <el-input v-model="query.keyword" placeholder="搜索账号" clearable size="small" class="search-input"
          @keyup.enter.native="loadData"></el-input>
        <el-select v-model="query.role_id" placeholder="角色" clearable size="small" style="width: 160px;"
          @change="loadData">
          <el-option v-for="item in roleOptions" :key="item.role_id" :label="item.role_name"
            :value="item.role_id"></el-option>
        </el-select>
        <el-select v-model="query.status" placeholder="状态" clearable size="small" style="width: 120px;"
          @change="loadData">
          <el-option label="正常" :value="0"></el-option>
          <el-option label="禁用" :value="1"></el-option>
        </el-select>
        <el-button type="primary" size="small" icon="el-icon-search" @click="loadData">筛选</el-button>
      </div>

      <!-- 批量操作 -->
      <div class="bulk-actions">
        <el-button type="primary" size="small" icon="el-icon-plus" @click="openDialog()">新增管理员</el-button>
        <el-button type="danger" size="small" icon="el-icon-delete" @click="batchDelete"
          :disabled="multipleSelection.length === 0">批量删除</el-button>
      </div>

      <!-- 列表 -->
      <el-table v-loading="loading" class="data-table" ref="data-table" :data="tableData" size="small"
        @selection-change="handleSelectionChange">
        <el-table-column type="selection" width="45px" align="center" header-align="center"></el-table-column>
        <el-table-column label="ID" prop="uid" width="80px" align="center" header-align="center"></el-table-column>
        <el-table-column label="账号" prop="username" min-width="160px" align="center"
          header-align="center"></el-table-column>
        <el-table-column label="角色" prop="role_name" width="120px" align="center"
          header-align="center"></el-table-column>
        <el-table-column label="类型" prop="role_type" width="100px" align="center"
          header-align="center"></el-table-column>
        <el-table-column label="状态" width="100px" align="center" header-align="center">
          <template slot-scope="scope">
            <el-tag :type="scope.row.status === 0 ? 'success' : 'danger'" class="status-tag"
              @click="toggleStatus(scope.row)">
              {{ scope.row.status === 0 ? '正常' : '禁用' }}
            </el-tag>
          </template>
        </el-table-column>
        <el-table-column label="最后登录时间" prop="lastvisit_text" width="180px" align="center"
          header-align="center"></el-table-column>
        <el-table-column label="操作" align="center" header-align="center" width="240px" fixed="right">
          <template slot-scope="scope">
            <el-button class="c-btn" type="primary" icon="el-icon-edit" size="small"
              @click="openDialog(scope.row)">编辑</el-button>
            <el-button class="c-btn" type="warning" icon="el-icon-key" size="small"
              @click="resetPassword(scope.row)">重置密码</el-button>
            <el-button class="c-btn" type="danger" icon="el-icon-delete" size="small"
              @click="deleteOne(scope.row)">删除</el-button>
          </template>
        </el-table-column>
      </el-table>

      <div class="page-box">
        <el-pagination background layout="prev, pager, next, jumper" :page-size="pageSize" :current-page.sync="page"
          :total="total" @current-change="loadData">
        </el-pagination>
      </div>

      <!-- 新增 / 编辑对话框 -->
      <el-dialog :title="form.uid ? '编辑管理员' : '新增管理员'" :visible.sync="dialogVisible" width="500px">
        <el-form :model="form" label-width="100px">
          <el-form-item label="登录账号">
            <el-input v-model="form.username" v-only-en-num autocomplete="off"></el-input>
          </el-form-item>
          <el-form-item label="登录密码" v-if="!form.uid">
            <el-input v-model="form.password" type="password" autocomplete="off"></el-input>
            <div class="setting-help">新增管理员时必填</div>
          </el-form-item>
          <el-form-item label="角色">
            <el-select v-model.number="form.role_id" placeholder="请选择角色" filterable style="width: 100%;">
              <el-option v-for="item in roleOptions" :key="item.role_id" :label="item.role_name"
                :value="item.role_id"></el-option>
            </el-select>
          </el-form-item>
          <el-form-item label="角色类型">
            <el-select v-model="form.role_type" placeholder="请选择">
              <el-option label="管理员" value="admin"></el-option>
              <el-option label="普通" value="normal"></el-option>
            </el-select>
          </el-form-item>
          <el-form-item label="状态">
            <el-switch v-model="form.status" :active-value="0" :inactive-value="1" active-text="正常"
              inactive-text="禁用"></el-switch>
          </el-form-item>
        </el-form>
        <div slot="footer" class="dialog-footer">
          <el-button @click="dialogVisible = false">取 消</el-button>
          <el-button type="primary" @click="submitForm">保 存</el-button>
        </div>
      </el-dialog>

      <!-- 重置密码对话框 -->
      <el-dialog title="重置密码" :visible.sync="resetDialogVisible" width="400px">
        <el-form :model="resetForm" label-width="100px">
          <el-form-item label="新密码">
            <el-input v-model="resetForm.password" type="password" autocomplete="off"></el-input>
          </el-form-item>
        </el-form>
        <div slot="footer" class="dialog-footer">
          <el-button @click="resetDialogVisible = false">取 消</el-button>
          <el-button type="primary" @click="submitResetPassword">确 定</el-button>
        </div>
      </el-dialog>
    </div>

    <script>
      new Vue({
        el: '#app',
        data() {
          return {
            loading: false,
            query: {
              keyword: '',
              role_id: '',
              status: ''
            },
            tableData: [],
            page: 1,
            pageSize: 20,
            total: 0,
            multipleSelection: [],
            roleOptions: [],
            dialogVisible: false,
            resetDialogVisible: false,
            form: {
              uid: 0,
              username: '',
              password: '',
              role_id: '',
              role_type: 'normal',
              status: 0
            },
            resetForm: {
              uid: 0,
              password: ''
            }
          }
        },
        created() {
          this.loadRoles();
          this.loadData();
        },
        methods: {
          async loadRoles() {
            try {
              const res = await sa.http({
                url: '/role/list',
                method: 'get',
                data: { page: 1, limit: 1000 }
              });
              const data = res.data || {};
              this.roleOptions = Array.isArray(data.list) ? data.list : [];
            } catch (e) {
              console.error('加载角色列表失败:', e);
            }
          },
          async loadData() {
            this.loading = true;
            try {
              const res = await sa.http({
                url: '/account/list',
                method: 'get',
                data: {
                  keyword: this.query.keyword,
                  role_id: this.query.role_id !== '' ? this.query.role_id : undefined,
                  status: this.query.status !== '' ? this.query.status : undefined,
                  page: this.page,
                  limit: this.pageSize
                }
              });
              const data = res.data || {};
              this.tableData = Array.isArray(data.list) ? data.list : [];
              this.total = parseInt(data.total) || 0;
            } catch (e) {
              console.error('加载管理员列表失败:', e);
              sa.error('加载管理员列表失败');
            } finally {
              this.loading = false;
            }
          },
          handleSelectionChange(val) {
            this.multipleSelection = val;
          },
          openDialog(row) {
            if (row) {
              this.form = {
                uid: row.uid,
                username: row.username,
                password: '',
                role_id: row.role_id,
                role_type: row.role_type,
                status: row.status
              };
            } else {
              this.form = {
                uid: 0,
                username: '',
                password: '',
                role_id: '',
                role_type: 'normal',
                status: 0
              };
            }
            this.dialogVisible = true;
          },
          async submitForm() {
            if (!this.form.username) {
              sa.error('请输入登录账号');
              return;
            }
            if (!this.form.uid && !this.form.password) {
              sa.error('新增管理员时必须设置密码');
              return;
            }
            if (!this.form.role_id) {
              sa.error('请选择角色');
              return;
            }
            try {
              await sa.http({
                url: '/account/save',
                method: 'post',
                data: {
                  id: this.form.uid,
                  username: this.form.username,
                  password: this.form.password,
                  role_id: this.form.role_id,
                  role_type: this.form.role_type,
                  status: this.form.status
                },
                showSuccess: true
              });
              this.dialogVisible = false;
              this.loadData();
            } catch (e) {
              console.error(e);
            }
          },
          // 禁用 / 启用
          async toggleStatus(row) {
            try {
              const res = await sa.http({
                url: '/account/ban',
                method: 'post',
                data: { uid: row.uid }
              });
              sa.ok(res.msg || '操作成功');
              this.loadData();
            } catch (e) {
              console.error(e);
              sa.error('操作失败');
            }
          },
          // 删除单个
          async deleteOne(row) {
            this.$confirm('确定要删除该管理员吗？', '提示', { type: 'warning' })
              .then(async () => {
                try {
                  await sa.http({
                    url: '/account/delete',
                    method: 'post',
                    data: { ids: [row.uid] },
                    showSuccess: true
                  });
                  this.loadData();
                } catch (e) {
                  console.error(e);
                }
              })
              .catch(() => { });
          },
          // 批量删除
          async batchDelete() {
            if (this.multipleSelection.length === 0) return;
            const ids = this.multipleSelection.map(i => i.uid);
            this.$confirm('确定要删除选中的管理员吗？', '提示', { type: 'warning' })
              .then(async () => {
                try {
                  await sa.http({
                    url: '/account/delete',
                    method: 'post',
                    data: { ids },
                    showSuccess: true
                  });
                  this.loadData();
                } catch (e) {
                  console.error(e);
                }
              })
              .catch(() => { });
          },
          // 打开重置密码对话框
          resetPassword(row) {
            this.resetForm = {
              uid: row.uid,
              password: ''
            };
            this.resetDialogVisible = true;
          },
          // 提交重置密码：复用 save 接口，只传 id + password
          async submitResetPassword() {
            if (!this.resetForm.password) {
              sa.error('请输入新密码');
              return;
            }
            try {
              await sa.http({
                url: '/account/save',
                method: 'post',
                data: {
                  id: this.resetForm.uid,
                  password: this.resetForm.password
                },
                showSuccess: true
              });
              this.resetDialogVisible = false;
            } catch (e) {
              console.error(e);
            }
          }
        }
      })
    </script>
</body>

</html>
