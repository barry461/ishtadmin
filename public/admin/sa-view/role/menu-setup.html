<!DOCTYPE html>
<html>

<head>
	<title>权限分配</title>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1,user-scalable=no" />
	<script src="../../static/common-head.js"></script>
	<style>
		body,
		.el-tree {
			background-color: #eee;
		}

		.el-tree-node {
			margin: 0.15em 0 !important;
		}

		/* 悬浮时颜色更深一点 */
		.el-tree-node__content:hover {
			background-color: #CFE8FC !important;
		}
	</style>
</head>

<body>
	<div class="vue-box sbot" style="display: none;" :style="'display: block;'">
		<!-- ------- 内容部分 ------- -->
		<div class="s-body">
			<!-- 表格 -->
			<div style="padding: 1em 2em;">
				<el-form>
					<div class="c-title">所有权限</div>
					<!-- 此扩展能递归渲染一个权限树，点击深层次节点，父级节点中没有被选中的节点会被自动选中，单独点击父节点，子节点会全部 选中/去选中 -->
					<el-tree ref="tree" :data="dataList" show-checkbox node-key="id" :default-expand-all="true"
						:default-checked-keys="selectList" :expand-on-click-node="false" :check-on-click-node="true"
						:check-strictly="true" @node-click="node_click" @check="node_click">
						<span class="custom-tree-node" slot-scope="s">
							<span style="color: #2D8CF0;" v-if="s.data.isShow == undefined || s.data.isShow == true">{{ s.data.name
								}}</span>
							<span style="color: #999;" v-if="s.data.isShow == false">{{ s.data.name }} (隐藏)</span>
							<span style="color: #999;" v-if="s.data.info">&emsp;———— {{s.data.info}} </span>
						</span>
					</el-tree>
				</el-form>
			</div>
		</div>
		<!-- ------- 底部按钮 ------- -->
		<div class="s-foot">
			<el-button type="success" @click="checkedAll()">全选</el-button>
			<el-button type="primary" @click="ok()">确定</el-button>
			<el-button @click="sa.closeCurrIframe()">取消</el-button>
		</div>
	</div>
	<script>
		var role_id = sa.p('role_id');
		var app = new Vue({
			el: '.vue-box',
			data: {
				dataList: [],	// 数据集合 
				selectList: [],	// 默认选中
				ywList: [],		// 一维数组 
				roleName: '',
			},
			methods: {
				flattenTree: function(list, result) {
					result = result || [];
					(list || []).forEach(function(item) {
						result.push(item);
						if (item.children && item.children.length) {
							app.flattenTree(item.children, result);
						}
					});
					return result;
				},
				loadPermissionTree: async function() {
					const res = await sa.http({
						url: '/role/permissionTree',
						method: 'get'
					});
					this.dataList = Array.isArray(res.data) ? res.data : [];
					this.ywList = this.flattenTree(this.dataList, []);
				},
				loadRoleDetail: async function() {
					const res = await sa.http({
						url: '/role/detail',
						method: 'get',
						data: { role_id: role_id }
					});
					const role = res.data || {};
					this.roleName = role.role_name || '';
					this.selectList = Array.isArray(role.permission_ids) ? role.permission_ids : [];
					this.$nextTick(function() {
						if (this.$refs.tree) {
							this.$refs.tree.setCheckedKeys(this.selectList);
						}
					}.bind(this));
				},
				// 保存
				ok: async function () {
					try {
						await sa.http({
							url: '/role/save',
							method: 'post',
							data: {
								role_id: parseInt(role_id),
								role_name: this.roleName,
								permission_ids: this.$refs.tree.getCheckedKeys()
							},
							showSuccess: true
						});
						if (parent && parent.app && parent.app.f5) {
							parent.app.f5();
						}
						sa.closeCurrIframe();
					} catch (e) {
						console.error(e);
					}
				},
				// 点击回调, 处理其子节点跟随父节点的选中
				node_click: function (node) {
					var is_select = this.$refs.tree.getCheckedKeys().indexOf(node.id) != -1;	// 此节点现在是否被选中 
					if (node.children) {
						node.children.forEach(function (item) {
							this.$refs.tree.setChecked(item.id, is_select);
							// 递归
							if (item.children) {
								this.node_click(item);
							}
						}.bind(this))
					}
				},
				// 全选/ 取消全选
				checkedAll: function () {
					if (this.$refs.tree.getCheckedKeys().length != this.ywList.length) {
						this.$refs['tree'].setCheckedNodes(this.ywList);
					} else {
						this.$refs['tree'].setCheckedNodes([]);
					}
				}
			},
			created: async function () {
				try {
					await this.loadPermissionTree();
					await this.loadRoleDetail();
				} catch (e) {
					console.error(e);
					sa.error('加载权限数据失败');
				}
			}
		})
	</script>
</body>

</html>
