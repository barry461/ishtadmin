map $host $is_domian_redirect {
    "~*^api\.${SLUG_DOMAIN_REG}$"      0;
    "~*^staff\.${SLUG_DOMAIN_REG}$"    0;
    "~*^[a-z0-9-]+\.${SLUG_DOMAIN_REG}$" 1;
    default 0;
}
server {
    listen       ${NGINX_V4_PORT} ${NGINX_DEF};
    listen       ${NGINX_V6_PORT} ${NGINX_DEF};
    server_name  ${SLUG_WWW};
    root   ${DEPLOY_PATH}/public/www;
    if ($is_domian_redirect) {
        return 301 https://${SLUG_DOMAIN_REDIRECT}$request_uri;
    }
	location /nginx_status {
	    stub_status on;
	    access_log   off;
	}
	if ($http_user_agent ~* (Amazonbot|SemrushBot|GPTBot|ClaudeBot)) {
        return 403;
    }
    location / {
        index  index.html index.htm index.php;
        if (!-f $request_filename){
            rewrite (.*) /index.php$1;
        }
    }
    location /internal_cache/ {
        internal;
        etag off;
        add_header ETag $upstream_http_etag;
        add_header Last-Modified $upstream_http_last_modified;
        alias ${DEPLOY_PATH}/storage/internal_cache/;
        sendfile on;
        tcp_nopush on;
    }
    location ~ /\. { deny all; }
	include enable-php-pathinfo.conf;
}