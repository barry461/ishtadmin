server {
    listen       ${NGINX_V4_PORT} ${NGINX_DEF};
    listen       ${NGINX_V6_PORT} ${NGINX_DEF};
    server_name  ${SLUG_WEB};
    root   ${DEPLOY_PATH}/public/lq_web;
	location /nginx_status {
	    stub_status on;
	    access_log   off;
	}
	if ($http_user_agent ~* (Amazonbot|SemrushBot|GPTBot|ClaudeBot)) {
            return 403;
        }
    location / {
        index  index.html;
    }
    location ~ /\. { deny all; }
}